version: 2

models:
  - name: stg_orders
    description: Cleaned order records from raw_orders seed.
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['paid', 'completed', 'shipped', 'cancelled', 'refunded']
      - name: order_date
        tests:
          - not_null

