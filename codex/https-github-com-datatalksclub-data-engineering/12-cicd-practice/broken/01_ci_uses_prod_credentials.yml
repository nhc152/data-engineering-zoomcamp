name: bad-ci-prod-credentials

on:
  pull_request:

jobs:
  bad-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Bad pattern:
      # Pull request CI should not use production credentials.
      # This could let test code read/write production data.
      - name: Export prod credentials
        run: |
          echo "DBT_TARGET=prod" >> $GITHUB_ENV
          echo "DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}" >> $GITHUB_ENV

      - name: Run tests against prod
        run: |
          echo "This is intentionally unsafe. Do not copy."

