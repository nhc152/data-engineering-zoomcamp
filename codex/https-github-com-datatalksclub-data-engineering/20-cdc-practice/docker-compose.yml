services:
  postgres:
    image: postgres:16
    container_name: cdc_practice_postgres
    environment:
      POSTGRES_USER: cdc_user
      POSTGRES_PASSWORD: cdc_password
      POSTGRES_DB: cdc_practice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdc_user -d cdc_practice"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

