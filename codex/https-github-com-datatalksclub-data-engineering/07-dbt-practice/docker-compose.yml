services:
  postgres:
    image: postgres:16
    container_name: dbt_practice_postgres
    environment:
      POSTGRES_USER: dbt_user
      POSTGRES_PASSWORD: dbt_password
      POSTGRES_DB: dbt_practice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbt_user -d dbt_practice"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

