version: 2

models:
  - name: dim_customers
    description: Current customer dimension. Grain is one row per customer.
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: customer_tier
        tests:
          - accepted_values:
              values: ['bronze', 'silver', 'gold', 'platinum']

  - name: dim_products
    description: Product dimension. Grain is one row per product.
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: fct_orders
    description: Order fact. Grain is one row per order.
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: order_status
        tests:
          - accepted_values:
              values: ['paid', 'shipped', 'completed', 'cancelled', 'refunded', 'unknown']

  - name: mart_daily_revenue
    description: Daily revenue mart. Grain is one row per order_date.
    columns:
      - name: order_date
        tests: [not_null, unique]

  - name: mart_customer_ltv
    description: Customer lifetime value mart. Grain is one row per customer.
    columns:
      - name: customer_id
        tests: [not_null, unique]

