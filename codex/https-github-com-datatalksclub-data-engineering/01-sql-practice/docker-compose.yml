services:
  postgres:
    image: postgres:16
    container_name: de_sql_practice_postgres
    environment:
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_password
      POSTGRES_DB: de_sql_practice
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U de_user -d de_sql_practice"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

