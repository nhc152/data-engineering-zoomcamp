id: retry_storm_flow_broken
namespace: de.zoomcamp.orchestration
description: Broken example. Too many fast retries can overload an unhealthy upstream.

inputs:
  - id: run_date
    type: STRING
    defaults: "2026-05-01"

tasks:
  - id: extract_orders_retry_storm
    type: io.kestra.plugin.scripts.python.Commands
    env:
      SIMULATE_EXTRACT_TRANSIENT_FAILURE: "1"
    commands:
      - python /app/scripts/extract_orders.py --run-date {{ inputs.run_date }}
    retry:
      type: constant
      interval: PT1S
      maxAttempt: 20

