id: ecommerce_daily_orders
namespace: de.zoomcamp.orchestration
description: Daily ecommerce orders pipeline with logical date, retry, validation, and publish step.

inputs:
  - id: run_date
    type: STRING
    defaults: "2026-05-01"

tasks:
  - id: extract_orders
    type: io.kestra.plugin.scripts.python.Commands
    commands:
      - python /app/scripts/extract_orders.py --run-date {{ inputs.run_date }}
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 3

  - id: load_raw_orders
    type: io.kestra.plugin.scripts.python.Commands
    commands:
      - python /app/scripts/load_raw_orders.py --run-date {{ inputs.run_date }}
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 2

  - id: validate_raw_orders
    type: io.kestra.plugin.scripts.python.Commands
    commands:
      - python /app/scripts/validate_raw_orders.py --run-date {{ inputs.run_date }}

  - id: build_marts
    type: io.kestra.plugin.scripts.python.Commands
    commands:
      - python /app/scripts/build_marts.py --run-date {{ inputs.run_date }}
    retry:
      type: constant
      interval: PT10S
      maxAttempt: 2

  - id: validate_marts
    type: io.kestra.plugin.scripts.python.Commands
    commands:
      - python /app/scripts/validate_marts.py --run-date {{ inputs.run_date }}

  - id: notify_success
    type: io.kestra.plugin.scripts.python.Commands
    commands:
      - python /app/scripts/notify_success.py --run-date {{ inputs.run_date }}

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 6 * * *"

