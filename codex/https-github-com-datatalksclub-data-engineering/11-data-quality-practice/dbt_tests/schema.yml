version: 2

models:
  - name: fct_orders
    description: "One row per order. Used for revenue and order analytics."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: order_status
        tests:
          - accepted_values:
              values: ['pending', 'paid', 'shipped', 'completed', 'cancelled', 'refunded']
      - name: recognized_revenue
        tests:
          - not_null

