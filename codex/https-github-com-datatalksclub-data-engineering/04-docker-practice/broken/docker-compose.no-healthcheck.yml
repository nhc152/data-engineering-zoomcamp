services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_password
      POSTGRES_DB: de_docker_lab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql/init:/docker-entrypoint-initdb.d:ro

  pipeline:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: de_docker_lab
      DATABASE_USER: de_user
      DATABASE_PASSWORD: de_password
      INPUT_FILE: /app/data/orders.csv
    volumes:
      - ../data:/app/data:ro
    depends_on:
      - postgres

volumes:
  postgres_data:

