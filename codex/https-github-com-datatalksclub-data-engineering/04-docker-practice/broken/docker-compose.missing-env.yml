services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_password
      POSTGRES_DB: de_docker_lab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U de_user -d de_docker_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

  pipeline:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: de_docker_lab
      DATABASE_USER: de_user
      INPUT_FILE: /app/data/orders.csv
    volumes:
      - ../data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

