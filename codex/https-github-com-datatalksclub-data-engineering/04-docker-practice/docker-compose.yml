services:
  postgres:
    image: postgres:16
    container_name: docker_lab_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-de_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-de_password}
      POSTGRES_DB: ${POSTGRES_DB:-de_docker_lab}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docker_lab_pipeline
    environment:
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${POSTGRES_DB:-de_docker_lab}
      DATABASE_USER: ${POSTGRES_USER:-de_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-de_password}
      INPUT_FILE: ${INPUT_FILE:-/app/data/orders.csv}
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

